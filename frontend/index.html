<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Response Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        h1 { color: #f1f5f9; margin-bottom: 8px; }
        .subtitle { color: #94a3b8; margin-bottom: 30px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        .card h2 { margin-bottom: 16px; color: #f1f5f9; font-size: 18px; }
        label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 4px; }
        input, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 14px; margin-bottom: 14px; }
        textarea { height: 80px; resize: vertical; }
        button { background: #ef4444; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; }
        button:hover { background: #dc2626; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: bold; }
        .CRITICAL { background: #7f1d1d; color: #fca5a5; }
        .HIGH { background: #7c2d12; color: #fdba74; }
        .MEDIUM { background: #713f12; color: #fde047; }
        .LOW { background: #14532d; color: #86efac; }
        .incident-card { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
        .incident-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .incident-location { font-weight: bold; font-size: 15px; }
        .incident-summary { color: #94a3b8; font-size: 13px; margin: 4px 0; }
        .incident-meta { color: #64748b; font-size: 12px; }
        #status-message { margin-top: 12px; padding: 10px; border-radius: 8px; display: none; font-size: 14px; }
        .success { background: #14532d; color: #86efac; }
        .error { background: #7f1d1d; color: #fca5a5; }
        .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .stat-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 20px; text-align: center; min-width: 100px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #f1f5f9; }
        .stat-label { font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <h1>🚨 Emergency Response Dashboard</h1>
    <p class="subtitle">AI-Powered Incident Classification System</p>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="stat-critical" style="color:#fca5a5">0</div>
            <div class="stat-label">Critical</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="stat-active" style="color:#fdba74">0</div>
            <div class="stat-label">Active</div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h2>📋 Submit Incident Report</h2>
            <label for="location">Location</label>
            <input type="text" id="location" placeholder="e.g. 123 Main St, downtown">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Describe the emergency in detail..."></textarea>
            <label for="reporter">Your Name (optional)</label>
            <input type="text" id="reporter" placeholder="Anonymous">
            <button id="submit-btn" onclick="submitReport()">Submit Emergency Report</button>
            <div id="status-message"></div>
        </div>

        <div class="card">
            <h2>📡 Active Incidents</h2>
            <div id="incidents-list">
                <p style="color:#64748b">No incidents yet. Submit a report to get started.</p>
            </div>
        </div>
    </div>

    <script>
        loadIncidents();
        setInterval(loadIncidents, 10000);

        async function submitReport() {
            const location    = document.getElementById("location").value.trim();
            const description = document.getElementById("description").value.trim();
            const reporter    = document.getElementById("reporter").value.trim();

            if (!location || !description) {
                showStatus("Please fill in location and description.", "error");
                return;
            }

            const btn = document.getElementById("submit-btn");
            btn.disabled = true;
            btn.textContent = "Analyzing with AI...";

            try {
                const response = await fetch("/incidents", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        location: location,
                        description: description,
                        reporter_name: reporter || "Anonymous"
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(`✅ Incident #${data.id} reported — Severity: ${data.severity}`, "success");
                    document.getElementById("location").value = "";
                    document.getElementById("description").value = "";
                    document.getElementById("reporter").value = "";
                    loadIncidents();
                } else {
                    showStatus(`Error: ${data.detail}`, "error");
                }
            } catch (err) {
                showStatus("Could not connect to server. Is it running?", "error");
            }

            btn.disabled = false;
            btn.textContent = "Submit Emergency Report";
        }

        async function loadIncidents() {
            try {
                const response = await fetch("/incidents");
                const data = await response.json();

                document.getElementById("stat-total").textContent = data.count;
                const critical = data.incidents.filter(i => i.severity === "CRITICAL").length;
                const active = data.incidents.filter(i => i.status === "ACTIVE").length;
                document.getElementById("stat-critical").textContent = critical;
                document.getElementById("stat-active").textContent = active;

                renderIncidents(data.incidents);
            } catch (err) {
                console.error("Failed to load incidents:", err);
            }
        }

        function renderIncidents(incidents) {
            const container = document.getElementById("incidents-list");

            if (incidents.length === 0) {
                container.innerHTML = '<p style="color:#64748b">No incidents yet.</p>';
                return;
            }

            const sorted = [...incidents].sort((a, b) => b.timestamp.localeCompare(a.timestamp));

            container.innerHTML = sorted.map(incident => `
                <div class="incident-card">
                    <div class="incident-header">
                        <span class="incident-location">📍 ${incident.location}</span>
                        <span class="badge ${incident.severity}">${incident.severity}</span>
                    </div>
                    <div class="incident-summary">${incident.summary}</div>
                    <div class="incident-meta">
                        #${incident.id} · ${incident.category} · ${incident.status}
                        · ${incident.reporter_name}
                        · ${new Date(incident.timestamp).toLocaleTimeString()}
                    </div>
                </div>
            `).join("");
        }

        function showStatus(message, type) {
            const el = document.getElementById("status-message");
            el.textContent = message;
            el.className = type;
            el.style.display = "block";
            setTimeout(() => { el.style.display = "none"; }, 5000);
        }
    </script>
</body>
</html>
